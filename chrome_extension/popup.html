<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toastmaster Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; }
    header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 16px 20px; border-bottom: 2px solid #e94560; }
    header h1 { font-size: 16px; color: #fff; }
    header span { font-size: 12px; color: #aaa; }
    .container { padding: 16px; }
    .status-box { background: #1a1a2e; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #2a2a4a; display: flex; align-items: center; gap: 10px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
    .status-dot.active { background: #4caf50; box-shadow: 0 0 8px #4caf50; animation: pulse 1.5s infinite; }
    .status-dot.stopped { background: #e94560; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 13px; color: #ccc; }
    .word-of-day-box { background: #1a1a2e; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #2a2a4a; }
    .word-of-day-box label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px; }
    .word { font-size: 20px; font-weight: 700; color: #e94560; }
    .not-detected { font-size: 13px; color: #aaa; font-style: italic; }
    .speaker-box { background: #1a1a2e; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #2a2a4a; }
    .speaker-box label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }
    .speaker-input { display: flex; gap: 8px; }
    input[type="text"] { flex: 1; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 6px; padding: 8px 12px; color: #fff; font-size: 13px; outline: none; }
    input[type="text"]:focus { border-color: #e94560; }
    .btn { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #e94560, #c23152); color: #fff; }
    .btn-success { background: #4caf50; color: #fff; }
    .btn-warning { background: #ff9800; color: #fff; }
    .btn-danger { background: #e94560; color: #fff; }
    .btn-full { width: 100%; padding: 12px; font-size: 15px; margin-bottom: 10px; }
    .speakers-list { background: #1a1a2e; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #2a2a4a; max-height: 150px; overflow-y: auto; }
    .speakers-list label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }
    .speaker-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #2a2a4a; font-size: 13px; }
    .speaker-item:last-child { border-bottom: none; }
    .speaker-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .speaker-status.done { background: #1a3a1a; color: #4caf50; }
    .speaker-status.speaking { background: #3a1a1a; color: #e94560; }
    .speaker-status.evaluating { background: #1a2a3a; color: #2196f3; }
    .timer { font-size: 28px; font-weight: 700; text-align: center; padding: 12px; background: #1a1a2e; border-radius: 10px; margin-bottom: 16px; border: 1px solid #2a2a4a; color: #4caf50; }
    .timer.yellow { color: #ffc107; }
    .timer.red { color: #e94560; }
    .hidden { display: none; }
  </style>
</head>
<body>
<header>
  <h1>🎤 Toastmaster Bot</h1>
  <span>AI Speech Evaluator</span>
</header>

<div id="not-meeting-page" class="hidden" style="padding:20px;text-align:center;color:#aaa;font-size:13px;line-height:1.6">
  <p style="font-size:32px;margin-bottom:12px">⚠️</p>
  <p>Please open a meeting on</p>
  <p style="color:#fff;font-weight:600;margin:8px 0">Google Meet, Teams or Zoom</p>
  <p>and then click this extension</p>
</div>

<div id="main-content" class="container">
  <div class="status-box">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-text" id="status-text">Ready to start</div>
  </div>

  <div class="word-of-day-box">
    <label>📖 Word of the Day</label>
    <div id="word-display" class="not-detected">Listening for word of day...</div>
  </div>

  <div class="timer" id="timer">00:00</div>

  <div class="speaker-box">
    <label>🎙️ Next Speaker Name</label>
    <div class="speaker-input">
      <input type="text" id="speaker-name-input" placeholder="Enter speaker name..." />
      <button class="btn btn-primary" id="next-speaker-btn">Next</button>
    </div>
  </div>

  <div class="speakers-list" id="speakers-list-box" style="display:none">
    <label>👥 Speakers</label>
    <div id="speakers-list"></div>
  </div>

  <div id="start-section">
    <button class="btn btn-success btn-full" id="start-btn">▶ Start Meeting</button>
  </div>

  <div id="meeting-section" class="hidden">
    <button class="btn btn-warning btn-full" id="end-speaker-btn">⏹ End Current Speaker</button>
    <button class="btn btn-danger btn-full" id="stop-btn">■ Stop Meeting</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
